services:
  postgres:
    image: postgres:16-alpine
    profiles: [local]
    environment:
      POSTGRES_USER: diabeo
      POSTGRES_PASSWORD: password
      POSTGRES_DB: diabeo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diabeo -d diabeo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
